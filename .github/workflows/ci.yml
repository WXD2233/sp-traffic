name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  shell-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate shell scripts
        run: bash tests/test.sh
      - name: Run worker integration test
        run: PYTHON_BIN=python3 bash tests/integration.sh
      - name: Run crash-recovery stress test
        run: PYTHON_BIN=python3 bash tests/stress.sh
      - name: Run ShellCheck
        run: shellcheck install.sh sp worker.sh tests/*.sh
